<!-- SUBOLI · Supply Tracker — single-file dashboard, no dependencies, no localStorage.
     Source of truth lives in the ITEMS array below. Edit there and commit, or
     cycle statuses live in the UI and use "Export JSON"/"Export CSV" to persist back. -->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SUBOLI · Supply Tracker</title>
<style>
  :root{
    --bg:#0d0e0c; --bg-soft:#13150f;

    --ink:#ece9e0; --ink-dim:#9a9d92; --ink-faint:#6b6e64;
    --glow:#e7c98c; --sage:#8fb877; --amber:#d9a441; --clay:#cd7c5f; --grey:#71746a;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;padding:0 0 64px;}
  .top{position:relative;overflow:hidden;border-bottom:1px solid var(--line);}
  .top::before{content:"";position:absolute;top:-180px;left:50%;transform:translateX(-50%);width:760px;height:340px;border-radius:50%;
    background:radial-gradient(closest-side,rgba(231,201,140,.22),rgba(231,201,140,.06) 55%,transparent 72%);filter:blur(6px);pointer-events:none;}
  .top-inner{position:relative;max-width:1240px;margin:0 auto;padding:30px 28px 26px;}
  .eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.34em;text-transform:uppercase;color:var(--ink-faint);}
  .wordmark{font-weight:300;font-size:30px;letter-spacing:.46em;text-transform:uppercase;margin:7px 0 0;padding-left:.46em;color:var(--ink);}
  .subtitle{margin-top:6px;color:var(--ink-dim);font-size:13px;} .subtitle b{color:var(--glow);font-weight:500;}
  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-top:24px;}
  .kpi{background:var(--bg-soft);padding:15px 16px;}
  .kpi .n{font-family:var(--mono);font-size:24px;font-weight:500;letter-spacing:-.01em;}
  .kpi .l{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-top:3px;}
  .kpi.secured .n{color:var(--sage)} .kpi.action .n{color:var(--amber)} .kpi.spend .n{color:var(--glow)}
  .wrap{max-width:1240px;margin:0 auto;padding:0 28px;}
  .bar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin:22px 0 6px;}
  .search{flex:1;min-width:200px;position:relative;}
  .search input{width:100%;background:var(--surface);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:10px 12px 10px 34px;font-family:var(--sans);font-size:13px;outline:none;}
  .search input::placeholder{color:var(--ink-faint)} .search input:focus{border-color:var(--line-strong)}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.45}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{font-family:var(--mono);font-size:11px;letter-spacing:.04em;background:var(--surface);border:1px solid var(--line);color:var(--ink-dim);padding:7px 11px;border-radius:999px;cursor:pointer;user-select:none;white-space:nowrap;transition:border-color .15s,color .15s,background .15s;}
  .chip:hover{border-color:var(--line-strong)} .chip[aria-pressed="true"]{background:var(--surface-2);border-color:var(--line-strong);color:var(--ink)}
  .chip .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:1px;}
  .btn{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;background:transparent;border:1px solid var(--line-strong);color:var(--ink-dim);padding:8px 12px;border-radius:8px;cursor:pointer;transition:color .15s,border-color .15s;}
  .btn:hover{color:var(--ink);border-color:var(--glow)}
  .flags{margin:14px 0 4px;border:1px solid var(--line);border-left:2px solid var(--amber);border-radius:10px;background:linear-gradient(90deg,rgba(217,164,65,.07),transparent 60%);padding:12px 16px;}
  .flags h3{margin:0 0 7px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);font-weight:600;}
  .flags ul{margin:0;padding-left:18px;color:var(--ink-dim);font-size:12.5px;} .flags li{margin:2px 0}
  .flags code{font-family:var(--mono);color:var(--ink);font-size:11.5px}
  .group{margin-top:26px;}
  .group-head{display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;padding:8px 4px 8px 0;border-bottom:1px solid var(--line);}
  .group-head .bar-accent{width:3px;height:16px;border-radius:2px;background:var(--sage);flex:none;}
  .group-name{font-size:15px;font-weight:500;letter-spacing:.01em;}
  .group-meta{font-family:var(--mono);font-size:11px;color:var(--ink-faint);} .group-meta .sp{color:var(--glow)}
  .caret{margin-left:auto;color:var(--ink-faint);font-size:12px;transition:transform .2s;font-family:var(--mono);}
  .group.collapsed .caret{transform:rotate(-90deg)} .group.collapsed .rows{display:none}
  table{width:100%;border-collapse:collapse;}
  thead th{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);text-align:left;font-weight:400;padding:9px 10px;border-bottom:1px solid var(--line);}
  tbody td{padding:11px 10px;border-bottom:1px solid var(--line);vertical-align:top;} tbody tr:hover{background:var(--surface)}
  .ref{font-family:var(--mono);font-size:12px;color:var(--glow);white-space:nowrap;}
  .name{color:var(--ink);font-size:13px;} .name .note{display:block;color:var(--ink-faint);font-size:11.5px;margin-top:2px;}
  .pn{font-family:var(--mono);font-size:11.5px;color:var(--ink-dim);white-space:nowrap;}
  .qty{font-family:var(--mono);font-size:12px;color:var(--ink-dim);text-align:right;}
  .cost{font-family:var(--mono);font-size:12px;color:var(--ink);text-align:right;white-space:nowrap;} .cost.empty{color:var(--ink-faint)}
  .status{display:inline-flex;align-items:center;gap:7px;cursor:pointer;user-select:none;font-family:var(--mono);font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;border:1px solid var(--line);border-radius:999px;padding:5px 10px 5px 8px;white-space:nowrap;background:var(--surface);transition:border-color .15s;}
  .status:hover{border-color:var(--line-strong)}
  .status .dot{width:7px;height:7px;border-radius:50%;flex:none;box-shadow:0 0 7px currentColor;}
  .st-instock{color:var(--sage)} .st-ordered{color:var(--glow)} .st-verify{color:var(--amber)} .st-tosource{color:var(--clay)} .st-deferred{color:var(--grey)}
  .status span.txt{color:var(--ink-dim)}
  .eta{display:inline-block;margin-left:8px;font-family:var(--mono);font-size:10px;letter-spacing:.04em;color:var(--ink-faint);white-space:nowrap;}
  .flagdot{display:inline-block;margin-left:6px;color:var(--amber);font-size:11px;vertical-align:1px;}
  .deliv{display:flex;align-items:center;gap:6px;margin-top:4px;font-family:var(--mono);font-size:11px;letter-spacing:.02em;color:var(--ink-dim);}
  .dmark{width:6px;height:6px;border-radius:50%;flex:none;}
  .dm-home{background:var(--sage)} .dm-pickup{background:var(--glow)} .dm-done{background:var(--ink-faint)} .dm-tbc{background:var(--clay)}
  .hint{margin:30px 0 0;color:var(--ink-faint);font-size:11.5px;font-family:var(--mono);letter-spacing:.02em;text-align:center;}
  .empty-state{text-align:center;color:var(--ink-faint);padding:48px 0;font-size:13px;}
  @media (max-width:760px){.kpis{grid-template-columns:repeat(2,1fr)}.wordmark{font-size:23px;letter-spacing:.34em}.pn-col,.qty-col{display:none}.top-inner,.wrap{padding-left:16px;padding-right:16px}}
</style>

function totals(list){
  let eur=0,huf=0;
  list.forEach(i=>{ if(i.status!=="deferred" && i.cost!=null){ if(i.cur==="HUF") huf+=i.cost*i.qty; else eur+=i.cost*i.qty; }});
  return {eur,huf};
}
function dotVar(s){return {instock:"--sage",ordered:"--glow",verify:"--amber",tosource:"--clay",deferred:"--grey"}[s];}

/* ============================ RENDER ============================ */
function renderKpis(){
  const t=totals(ITEMS);
  const secured=ITEMS.filter(i=>i.status==="instock"||i.status==="ordered").length;
  const action=ITEMS.filter(i=>i.status==="verify"||i.status==="tosource"||(i.flag&&i.flag.trim())).length;
  const deferred=ITEMS.filter(i=>i.status==="deferred").length;
  const spendSub = "+ "+fmtHuf(t.huf)+" logged";
  document.getElementById("kpis").innerHTML = `
    <div class="kpi"><div class="n">${ITEMS.length}</div><div class="l">Line items</div></div>
    <div class="kpi secured"><div class="n">${secured}</div><div class="l">Secured</div></div>
    <div class="kpi action"><div class="n">${action}</div><div class="l">Needs action</div></div>
    <div class="kpi"><div class="n">${deferred}</div><div class="l">Deferred</div></div>
    <div class="kpi spend"><div class="n">€${t.eur.toFixed(2)}</div><div class="l">${spendSub}</div></div>`;
}

function renderFlags(){
  const flagged = ITEMS.filter(i=>(i.flag&&i.flag.trim())||i.status==="verify"||i.status==="tosource");
  const el=document.getElementById("flags");
  if(!flagged.length){el.style.display="none";return;}
  el.style.display="";
  el.innerHTML = `<h3>Open items — action needed</h3><ul>${
    flagged.map(i=>{
      const msg = (i.flag&&i.flag.trim()) ? i.flag : STATUS[i.status].label;
      return `<li><code>${i.ref}</code> · ${i.name} — ${msg}</li>`;
    }).join("")
  }</ul>`;
}

function renderChips(){
  const order=["instock","ordered","verify","tosource","deferred"];
  document.getElementById("statusChips").innerHTML = order.map(s=>{
    const n=ITEMS.filter(i=>i.status===s).length;
    return `<button class="chip" data-st="${s}" aria-pressed="${filterStatus===s}"><span class="dot" style="background:var(${dotVar(s)})"></span>${STATUS[s].label} · ${n}</button>`;
  }).join("");
  document.querySelectorAll("#statusChips .chip").forEach(c=>c.onclick=()=>{
    filterStatus = filterStatus===c.dataset.st?null:c.dataset.st; renderAll();
  });
}

function passes(i){
  if(filterStatus && i.status!==filterStatus) return false;
  if(query){ const hay=(i.ref+" "+i.name+" "+i.sup+" "+i.pn+" "+i.note).toLowerCase(); if(!hay.includes(query)) return false; }
  return true;
}

function renderBoard(){
  const board=document.getElementById("board");
  const visible=ITEMS.filter(passes);
  if(!visible.length){board.innerHTML=`<div class="empty-state">No parts match this filter.</div>`;return;}
  const groups={}; visible.forEach(i=>{(groups[i.sup] ||= []).push(i);});
  const sups=Object.keys(groups).sort((a,b)=>{
    const ia=SUPPLIER_ORDER.indexOf(a), ib=SUPPLIER_ORDER.indexOf(b);
    return (ia<0?99:ia)-(ib<0?99:ib);
  });
  board.innerHTML = sups.map(sup=>{
    const rows=groups[sup];
    const t=totals(rows);
    const parts=[]; if(t.eur>0)parts.push("€"+t.eur.toFixed(2)); if(t.huf>0)parts.push(fmtHuf(t.huf));
    const spendTxt = parts.length? ` · <span class="sp">${parts.join(" + ")}</span>` : "";
    return `<section class="group" data-sup="${sup}">
      <div class="group-head"><span class="bar-accent"></span>
        <span class="group-name">${sup}</span>
        <span class="group-meta">${rows.length} item${rows.length>1?"s":""}${spendTxt}</span>
        <span class="caret">▾</span></div>
      <div class="rows"><table>
        <thead><tr><th>Ref</th><th>Component</th><th class="pn-col">Supplier&nbsp;PN</th>
          <th class="qty-col" style="text-align:right">Qty</th><th style="text-align:right">Unit</th><th>Status</th></tr></thead>
        <tbody>${rows.map(rowHtml).join("")}</tbody></table></div></section>`;
  }).join("");
  board.querySelectorAll(".group-head").forEach(h=>h.onclick=()=>h.parentElement.classList.toggle("collapsed"));
  board.querySelectorAll(".status").forEach(s=>s.onclick=e=>{e.stopPropagation();cycle(s.dataset.ref);});
}

function rowHtml(i){
  const st=STATUS[i.status];
  const flagDot = (i.flag&&i.flag.trim()) ? `<span class="flagdot" title="${i.flag}">⚑</span>` : "";
  const dparts=[]; if(i.carrier)dparts.push(i.carrier); if(i.deliv)dparts.push(i.deliv); if(i.eta)dparts.push(i.eta);
  const dm={Home:"dm-home",Pickup:"dm-pickup",Delivered:"dm-done"}[i.deliv]||"dm-tbc";
  const deliv = dparts.length ? `<span class="deliv"><span class="dmark ${dm}"></span>${dparts.join(" · ")}</span>` : "";
  return `<tr>
    <td class="ref">${i.ref}</td>
    <td><span class="name">${i.name}${i.note?`<span class="note">${i.note}</span>`:""}${deliv}</span></td>
    <td class="pn pn-col">${i.pn||"—"}</td>
    <td class="qty qty-col">${i.qty}</td>
    <td class="cost ${i.cost==null?"empty":""}">${fmtCost(i.cost,i.cur)}</td>
    <td><span class="status ${st.cls}" data-ref="${i.ref}" title="Click to cycle status"><span class="dot"></span><span class="txt">${st.label}</span></span>${flagDot}</td>
  </tr>`;
}

function cycle(ref){
  const it=ITEMS.find(x=>x.ref===ref); if(!it||it.status==="deferred") return;
  const idx=CYCLE.indexOf(it.status); it.status=CYCLE[(idx+1)%CYCLE.length]; renderAll();
}

/* ============================ EXPORT ============================ */
function download(name,text,type){
  const b=new Blob([text],{type}),u=URL.createObjectURL(b);
  const a=document.createElement("a");a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),500);
}
document.getElementById("exJson").onclick=()=>download("suboli-supply-tracker.json",JSON.stringify(ITEMS,null,2),"application/json");
document.getElementById("exCsv").onclick=()=>{
  const head=["Ref","Component","Supplier","Supplier_PN","Qty","UnitCost","Currency","Status","ETA","Note","Flag"];
  const esc=v=>`"${String(v??"").replace(/"/g,'""')}"`;
  const rows=ITEMS.map(i=>[i.ref,i.name,i.sup,i.pn,i.qty,i.cost??"",i.cur,STATUS[i.status].label,i.eta,i.note,i.flag].map(esc).join(","));
  download("suboli-supply-tracker.csv",[head.join(","),...rows].join("\n"),"text/csv");
};

/* ============================ WIRE-UP ============================ */
document.getElementById("q").addEventListener("input",e=>{query=e.target.value.trim().toLowerCase();renderBoard();});
function renderAll(){renderKpis();renderFlags();renderChips();renderBoard();}
renderAll();
</script>
